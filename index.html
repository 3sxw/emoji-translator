<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emoji Translator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="bg-emojis" id="bg-emojis" aria-hidden="true"></div>
  <div class="burst-layer" id="burst-layer" aria-hidden="true"></div>

  <main class="app">
    <h1><span class="logo">😀</span> <span class="title-text">Emoji Translator</span></h1>
    <p class="tagline">Type a sentence and watch your words turn into emojis ✨</p>

    <div class="warning" id="warning" hidden></div>

    <div class="controls-row">
      <div class="field">
        <label for="language">🌍 Input language</label>
        <select id="language">
          <option value="en" selected>English</option>
          <option value="es">Español (Spanish)</option>
          <option value="fr">Français (French)</option>
          <option value="de">Deutsch (German)</option>
          <option value="ar">العربية (Arabic)</option>
        </select>
      </div>
      <div class="field live-field">
        <label for="live-toggle">⚡ Live mode</label>
        <label class="switch">
          <input type="checkbox" id="live-toggle">
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <label for="input-text">📝 Your text</label>
    <textarea id="input-text" rows="4" dir="auto"
      placeholder="e.g. I love pizza and my dog makes me happy"></textarea>

    <div class="buttons">
      <button id="translate-btn" class="primary">✨ Translate</button>
      <button id="surprise-btn" title="Fill in a random example">🎲 Surprise me</button>
      <button id="clear-btn">🧹 Clear</button>
    </div>

    <label for="output-text">💬 Emoji translation</label>
    <textarea id="output-text" rows="4" readonly dir="auto"
      placeholder="Your translation appears here..."></textarea>

    <div class="stats" id="stats" hidden></div>

    <button id="copy-btn" class="copy">📋 Copy result</button>
  </main>

  <script src="emoji-dictionary.js"></script>
  <script src="lang-dictionaries.js"></script>
  <script src="script.js"></script>
</body>
</html>
